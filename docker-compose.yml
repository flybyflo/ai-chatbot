services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_chat_app
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - '3000:3000'
    environment:
      - REDIS_URL=redis://redis:6379
      # Expose the realtime gateway URL to the browser (defaults to http://localhost:3030 in code)
      # - NEXT_PUBLIC_REALTIME_URL=http://localhost:3030
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-test-server:
        condition: service_started
      realtime-gateway:
        condition: service_started
    env_file:
      - .env.local

  mcp-test-server:
    build: ./mcp-test-server
    restart: always
    ports:
      - '8000:8000'

  realtime-gateway:
    build: ./realtime-gateway
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
    ports:
      - '3030:3030'

volumes:
  postgres_data:
  redis_data:
